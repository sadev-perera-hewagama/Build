<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | AutoVistaShowroom</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-loading-content">
          <h1 id="unity-title">Welcome to Auto Vista Showroom</h1>
          <p id="unity-subtitle">Please wait while we prepare your experience...</p>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
          <div id="unity-progress-text">0%</div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var progressText = document.querySelector("#unity-progress-text");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build.data",
        frameworkUrl: buildUrl + "/Build.framework.js",
        codeUrl: buildUrl + "/Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "AutoVistaShowroom",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      async function loadChunkedData(baseUrl, numChunks) {
        const chunks = [];
        for (let i = 1; i <= numChunks; i++) {
          const response = await fetch(`${baseUrl}.part${i}`);
          if (!response.ok) throw new Error(`Failed to load chunk ${i}`);
          chunks.push(await response.arrayBuffer());
          
          var percent = Math.round(i / numChunks * 50);
          progressBarFull.style.width = percent + "%"; 
          progressText.innerHTML = percent + "%";
        }
        const blob = new Blob(chunks, { type: 'application/octet-stream' });
        return URL.createObjectURL(blob);
      }

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = async () => {
        try {
          config.dataUrl = await loadChunkedData(config.dataUrl, 6);
          
          createUnityInstance(canvas, config, (progress) => {
            var percent = Math.round(50 + 50 * progress);
            progressBarFull.style.width = percent + "%";
            progressText.innerHTML = percent + "%";
            if (progress === 1) {
              progressText.innerHTML = "Preparing Showroom...";
            }
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
          }).catch((message) => {
            alert(message);
          });
        } catch (err) {
          alert(err);
        }
      };

      document.body.appendChild(script);

    </script>
  </body>
</html>
